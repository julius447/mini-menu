<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evify — "En leverantör, oavsett dina behov" (1:1 klon / referens)</title>

  <!-- Evify's font: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 4 grid (verbatim, the same file Evify ships) -->
  <link rel="stylesheet" href="evify-assets/bootstrap.min.css">
  <!-- Evify's real CSS, extracted verbatim from base.css -->
  <link rel="stylesheet" href="evify-assets/root-vars.css">
  <link rel="stylesheet" href="evify-assets/mini-menu.css">

  <style>
    /* Shell / gap-fillers — the small base.css bits Evify's page supplies around the block.
       Kept faithful to the live render (Montserrat, weights, lead styling, section rhythm). */
    body { margin: 0; background: #fff; color: #0b1b2b; font-family: Montserrat, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .evify-header-1 { font-weight: 600; }
    .evify-lead { max-width: 760px; margin: 16px auto 0; color: #5a6b7b; font-size: 18px; line-height: 1.55; }
    .py-10vh { padding-top: 10vh; padding-bottom: 10vh; }
  </style>
</head>
<body>

  <!-- ===== Evify "En leverantör, oavsett dina behov" — markup copied verbatim from evify.se ===== -->
  <section class="container-fluid py-10vh">
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col-xl-11">

          <div class="text-center">
            <h2 class="evify-header-1 w-600">En leverantör, oavsett dina behov</h2>
            <p class="evify-lead">Med över 20 000 installationer bakom oss vet vi vilka produkter och lösningar som är bäst. <br class="d-none d-xl-block">Vi tar hand om hela resan från första kontakt till installation och support.</p>
          </div>

          <div class="mt-5 pt-3">
            <div class="row justify-content-center">

              <!-- Card 1 -->
              <div class="col-md-4 mb-4 mb-md-0">
                <div class="product-category-container">
                  <img src="https://evify2.s3.amazonaws.com/static/assets/img/evify-laddbox-1.jpg" width="800" height="800" loading="lazy" class="product-category-img img-fluid" alt="Laddbox Elbilsladdare">
                  <div class="product-category-text-container">
                    <h3 class="evify-header-2 w-600">Laddbox</h3>
                    <div class="mt-5"><a href="/laddbox/" class="cta-box-btn">Läs mer</a></div>
                  </div>
                </div>
              </div>

              <!-- Card 2 -->
              <div class="col-md-4 mb-4 mb-md-0">
                <div class="product-category-container">
                  <div class="bg-overlay"></div>
                  <img src="https://evify2.s3.amazonaws.com/static/assets/img/evify-solceller-1.jpg" width="800" height="800" loading="lazy" class="product-category-img img-fluid" alt="Solceller Villa">
                  <div class="product-category-text-container">
                    <h3 class="evify-header-2 w-600">Solceller</h3>
                    <div class="mt-5"><a href="/solceller/" class="cta-box-btn">Läs mer</a></div>
                  </div>
                </div>
              </div>

              <!-- Card 3 -->
              <div class="col-md-4 mb-4 mb-md-0">
                <div class="product-category-container">
                  <div class="bg-overlay"></div>
                  <img src="https://evify2.s3.amazonaws.com/static/assets/img/evify-batteri-1.jpg" width="800" height="800" loading="lazy" class="product-category-img img-fluid" alt="Solcellsbatteri Villa">
                  <div class="product-category-text-container">
                    <h3 class="evify-header-2 w-600">Batteri</h3>
                    <div class="mt-5"><a href="/solcellsbatteri/" class="cta-box-btn">Läs mer</a></div>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
