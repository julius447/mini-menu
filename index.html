<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ampy — "Din elektriker för hela hemmet"</title>
<!-- Prototype only: production self-hosts Outfit (no Google Fonts request). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Ampy canonical tokens (values match ampy-design-system/reference/tokens.css) ===== */
:root{
  --ap-navy:#090b32; --ap-teal:#00a991;
  --ap-blue:#5eb1bf; --ap-blue-bright:#74c2ce;   /* Ampy sky-blue (brandbook secondary) — the CTA "ljusblå", owner-picked */
  --ap-offwhite:#f5f9ff; --ap-white:#ffffff;
  --ink:#0f123c; --ink-muted:#565e82; --ap-black:#1e1e1e;
  --font:"Outfit",system-ui,-apple-system,sans-serif;
  --w-light:300; --w-reg:400; --w-med:500; --w-semi:600; --w-bold:700;
  --fs-sm:clamp(1.4rem,1.3rem + 0.3vw,1.6rem);
  --fs-body:clamp(1.6rem,1.5rem + 0.4vw,1.9rem);
  --fs-lead:clamp(1.7rem,1.62rem + 0.25vw,1.85rem);   /* style guide --aptext-m (17->18.5px) */
  --fs-cardtitle:clamp(2rem,1.5rem + 1.1vw,3rem);
  --fs-h2:clamp(2.8rem,2.3rem + 1.1vw,3.8rem);         /* guide-scale H2, wt 500 / lh 1.2 */
  --tr-tight:-0.022em;
  --s-2:0.8rem; --s-3:1.2rem; --s-4:1.6rem; --s-5:2.4rem; --s-6:3.2rem; --s-7:4.8rem; --s-8:6.4rem;
  --r-lg:2rem; --r-pill:999rem;
  --shadow-card:0 1.6rem 4rem -1.2rem rgba(9,11,50,0.28),0 0.4rem 1rem -0.4rem rgba(9,11,50,0.18);
  --shadow-card-h:0 3rem 6rem -1.4rem rgba(9,11,50,0.38),0 1rem 2rem -0.6rem rgba(9,11,50,0.22);
  --shadow-blue:0 1rem 2.4rem -0.6rem rgba(94,177,191,0.55);
  --ring:0 0 0 0.3rem rgba(0,169,145,0.9);
  --normal:280ms;
  --ease:cubic-bezier(0.2,0.6,0.2,1); --ease-out:cubic-bezier(0.16,1,0.3,1);
}
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:62.5%;-webkit-text-size-adjust:100%;}
body{font-family:var(--font);font-weight:var(--w-reg);font-size:var(--fs-body);line-height:1.6;
  color:var(--ink);background:var(--ap-offwhite);
  font-feature-settings:"kern" 1,"liga" 1;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
img,svg{display:block;max-width:100%;} a{color:inherit;text-decoration:none;}
::selection{background:rgba(0,169,145,0.22);}

/* ============================================================================
   BLOCK — Evify layout (identical sizing/placement) + Hemsol hover + Ampy skin
   ============================================================================ */
.amp3{padding-block:clamp(var(--s-8),4rem + 6vw,11rem);}
.amp3__wrap{width:100%;max-width:132rem;margin-inline:auto;
  /* per-side safe areas so a landscape notch never clips either edge */
  padding-left:max(var(--s-5),env(safe-area-inset-left));
  padding-right:max(var(--s-5),env(safe-area-inset-right));}

/* centred header. Type follows the style guide: H2 Medium 500 / lh 1.2; body Light 300. */
.amp3__head{max-width:96rem;margin-inline:auto;text-align:center;}
/* wide enough to stay on ONE line on desktop; wraps safely on phones (viewport < text) */
.amp3__title{max-width:60rem;margin-inline:auto;font-size:var(--fs-h2);font-weight:var(--w-med);line-height:1.2;
  letter-spacing:-0.01em;color:var(--ink);text-wrap:balance;overflow-wrap:break-word;}
/* lead is deliberately WIDER than the title (2 lines, not 3) */
.amp3__lead{margin:var(--s-5) auto 0;max-width:60rem;font-size:var(--fs-lead);
  font-weight:var(--w-light);line-height:1.5;color:var(--ink-muted);text-wrap:pretty;}

/* 3 equal square cards, 30px gutters (Evify), rounded 20px */
.amp3__grid{margin-top:clamp(var(--s-7),3rem + 2vw,var(--s-8));
  display:grid;grid-template-columns:repeat(3,1fr);gap:3rem;}

.pcard{position:relative;display:block;aspect-ratio:1/1;overflow:hidden;
  border-radius:var(--r-lg);background:var(--ap-navy);box-shadow:var(--shadow-card);
  -webkit-tap-highlight-color:transparent;
  transition:transform var(--normal) var(--ease),box-shadow var(--normal) var(--ease);}
/* aspect-ratio fallback for very old browsers (iOS < 15): keep a square via padding */
.pcard::before{content:"";display:block;padding-top:100%;}
@supports (aspect-ratio:1/1){ .pcard::before{display:none;} }
.pcard:hover,.pcard:focus-visible{transform:translateY(-0.4rem);box-shadow:var(--shadow-card-h);outline:0;}
.pcard:focus-visible{box-shadow:var(--ring),var(--shadow-card-h);}

/* media = the photo, set as a background LAYER stacked over a per-card aurora gradient.
   If the photo 404s (or CSP blocks it), the gradient shows — no <img>, no broken-image icon,
   nothing inline to be blocked. The whole layer zooms on hover (the Hemsol move). */
.pcard__media{position:absolute;inset:0;z-index:0;
  background-position:center;background-size:cover;background-repeat:no-repeat;
  transform:scale(1);transition:transform 640ms var(--ease-out);}
.pcard:hover .pcard__media,.pcard:focus-visible .pcard__media{transform:scale(1.08);will-change:transform;}
.pcard--elservice .pcard__media{background-image:url("img/elservice.webp"),
  radial-gradient(60rem 44rem at 78% 16%,rgba(0,169,145,0.5),transparent 60%),
  linear-gradient(180deg,#0d1350,#06082a);}
.pcard--laddbox .pcard__media{background-image:url("img/laddbox.webp"),
  radial-gradient(56rem 42rem at 74% 84%,rgba(57,194,129,0.46),transparent 60%),
  linear-gradient(180deg,#0d1145,#06082a);}
.pcard--batteri .pcard__media{background-image:url("img/batterilagring.webp"),
  radial-gradient(54rem 42rem at 20% 20%,rgba(0,169,145,0.44),transparent 60%),
  linear-gradient(180deg,#0b0e38,#05061f);}

/* overall legibility overlay; Hemsol-style deepen on hover */
.pcard__overlay{position:absolute;inset:0;z-index:1;
  background:radial-gradient(125% 105% at 50% 50%,rgba(9,11,50,0.30),rgba(9,11,50,0.56));
  transition:background 420ms var(--ease);}
.pcard:hover .pcard__overlay,.pcard:focus-visible .pcard__overlay{
  background:radial-gradient(125% 105% at 50% 50%,rgba(9,11,50,0.34),rgba(9,11,50,0.62));}

/* centred content (Evify placement). The soft centre scrim guarantees the white title
   stays AA-legible over ANY photo, while the card edges keep the photo vivid. */
.pcard__body{position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s-5);
  text-align:center;padding:var(--s-5);color:var(--ap-white);
  background:radial-gradient(ellipse 82% 56% at 50% 50%,rgba(9,11,50,0.60) 0%,rgba(9,11,50,0.30) 52%,transparent 78%);}
.pcard__title{font-size:var(--fs-cardtitle);font-weight:var(--w-bold);line-height:1.05;
  letter-spacing:var(--tr-tight);color:var(--ap-white);overflow-wrap:break-word;hyphens:auto;
  text-shadow:0 0.1rem 2.4rem rgba(0,0,0,0.4);
  transition:transform 220ms var(--ease-out);}
.pcard:hover .pcard__title,.pcard:focus-visible .pcard__title{transform:translateY(-0.2rem);}

/* the CTA pill — kept from Evify, recoloured to the Ampy sky-blue with black text */
.pcard__cta{display:inline-flex;align-items:center;gap:var(--s-2);
  padding:1.5rem 3.2rem;border-radius:var(--r-pill);
  background:var(--ap-blue);color:var(--ap-black);
  font-size:var(--fs-sm);font-weight:var(--w-bold);letter-spacing:0.01em;
  box-shadow:var(--shadow-blue);
  transition:background 200ms var(--ease),transform 200ms var(--ease-out),box-shadow 200ms var(--ease);}
.pcard__cta svg{width:1.7rem;height:1.7rem;fill:none;stroke:currentColor;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
  transition:transform 200ms var(--ease-out);}
.pcard:hover .pcard__cta,.pcard:focus-visible .pcard__cta{
  background:var(--ap-blue-bright);transform:translateY(-0.2rem);
  box-shadow:0 1.4rem 3rem -0.6rem rgba(94,177,191,0.6);}
.pcard:hover .pcard__cta svg,.pcard:focus-visible .pcard__cta svg{transform:translateX(0.3rem);}

/* quiet load stagger */
@keyframes amp3-rise{from{opacity:0;transform:translateY(1.6rem);}to{opacity:1;transform:none;}}
.rise{animation:amp3-rise 520ms var(--ease-out) both;}
.rise.d1{animation-delay:.05s;} .rise.d2{animation-delay:.12s;}
.rise.d3{animation-delay:.20s;} .rise.d4{animation-delay:.28s;} .rise.d5{animation-delay:.36s;}

/* responsive — identical to Evify: 3-up >=768, stacked square below */
@media (max-width:767px){
  /* single column, but CAP the card width so a full-width square never explodes into
     a giant tile on large phones / small tablets (that was the mobile break) */
  .amp3__grid{grid-template-columns:1fr;gap:var(--s-5);max-width:44rem;margin-inline:auto;}
  .pcard__cta{padding:1.4rem 2.8rem;}
}
@media (forced-colors:active){ .pcard:focus-visible{outline:0.2rem solid;outline-offset:0.2rem;} }

/* print: backgrounds are dropped by browsers -> show a plain legible list instead */
@media print{
  .amp3{padding-block:0;}
  .amp3__grid{grid-template-columns:1fr;gap:1rem;}
  .pcard{aspect-ratio:auto;background:#fff;box-shadow:none;border:1px solid #ccc;color:#000;}
  .pcard::before{display:none;}
  .pcard__media,.pcard__overlay{display:none;}
  .pcard__body{position:static;background:none;color:#000;align-items:flex-start;padding:1.2rem;}
  .pcard__title{color:#000;text-shadow:none;}
  .pcard__cta{color:#000;background:none;box-shadow:none;padding:0.4rem 0;}
}
</style>
</head>
<body>

<section class="amp3" aria-labelledby="amp3-title">
  <div class="amp3__wrap">

    <header class="amp3__head">
      <h2 class="amp3__title rise d1" id="amp3-title">Din elektriker för hela hemmet</h2>
      <p class="amp3__lead rise d2">Med över 3000 installationer per år hjälper vi dig med elinstallationer, laddbox och batterilagring, allt under ett och samma tak.</p>
    </header>

    <div class="amp3__grid">

      <!-- Ruta 1 — Elservice  (bild 1: det upplysta huset i skymning) -->
      <a class="pcard pcard--elservice rise d3" href="/elservice/" aria-label="Elservice – läs mer">
        <span class="pcard__media"></span>
        <span class="pcard__overlay"></span>
        <span class="pcard__body">
          <span class="pcard__title">Elservice</span>
          <span class="pcard__cta">Läs mer <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
        </span>
      </a>

      <!-- Ruta 2 — Laddbox  (bild 3: laddaren på träpanelen) -->
      <a class="pcard pcard--laddbox rise d4" href="/laddboxar/" aria-label="Laddbox – läs mer">
        <span class="pcard__media"></span>
        <span class="pcard__overlay"></span>
        <span class="pcard__body">
          <span class="pcard__title">Laddbox</span>
          <span class="pcard__cta">Läs mer <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
        </span>
      </a>

      <!-- Ruta 3 — Batterilagring  (bild 2: trähuset med solceller) -->
      <a class="pcard pcard--batteri rise d5" href="/batterilagring/" aria-label="Batterilagring – läs mer">
        <span class="pcard__media"></span>
        <span class="pcard__overlay"></span>
        <span class="pcard__body">
          <span class="pcard__title">Batterilagring</span>
          <span class="pcard__cta">Läs mer <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
        </span>
      </a>

    </div>
  </div>
</section>

</body>
</html>
