<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ampy — "En leverantör" (block 2) · Ampy-kvalitet</title>
<!-- Prototype only: production self-hosts Outfit (no Google Fonts request). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Ampy canonical tokens (values match ampy-design-system/reference/tokens.css) ===== */
:root{
  --ap-navy:#090b32; --ap-navy-2:#0d1145; --ap-teal:#00a991; --ap-teal-bright:#1cc4af;
  --ap-green:#39c281; --ap-mint:#55ff9a; --ap-offwhite:#f5f9ff; --ap-white:#ffffff;
  --bg-page:var(--ap-offwhite); --bg-surface:var(--ap-white);
  --ink:#0f123c; --ink-muted:#565e82; --ink-faint:#8a90ac;
  --on-dark:rgba(255,255,255,0.96); --on-dark-muted:rgba(255,255,255,0.68);
  --on-dark-line:rgba(255,255,255,0.12); --on-dark-line-2:rgba(255,255,255,0.22);
  --on-dark-fill:rgba(255,255,255,0.05);
  --font:"Outfit",system-ui,-apple-system,sans-serif;
  --w-light:300; --w-reg:400; --w-med:500; --w-semi:600; --w-bold:700; --w-black:800;
  --fs-eyebrow:clamp(1.2rem,1.1rem + 0.2vw,1.35rem);
  --fs-sm:clamp(1.4rem,1.3rem + 0.3vw,1.6rem);
  --fs-body:clamp(1.6rem,1.5rem + 0.4vw,1.9rem);
  --fs-lead:clamp(1.9rem,1.7rem + 0.6vw,2.3rem);
  --fs-h3:clamp(2.2rem,1.9rem + 0.9vw,2.8rem);
  --fs-h2:clamp(3.0rem,2.4rem + 1.8vw,4.4rem);
  --lh-tight:1.04; --lh-snug:1.18; --lh-body:1.6;
  --tr-tight:-0.022em; --tr-eyebrow:0.16em;
  --s-1:0.4rem; --s-2:0.8rem; --s-3:1.2rem; --s-4:1.6rem; --s-5:2.4rem;
  --s-6:3.2rem; --s-7:4.8rem; --s-8:6.4rem; --s-9:9.6rem; --s-10:13rem;
  --measure:56rem;
  --r-sm:0.8rem; --r-md:1.4rem; --r-lg:2.2rem; --r-xl:3.2rem; --r-pill:999rem;
  --shadow-2:0 0.6rem 1.6rem -0.4rem rgba(15,18,60,0.10),0 0.2rem 0.6rem rgba(15,18,60,0.06);
  --shadow-3:0 2.4rem 5rem -1rem rgba(15,18,60,0.18),0 0.8rem 1.6rem -0.6rem rgba(15,18,60,0.10);
  --shadow-teal:0 1.2rem 3rem -0.8rem rgba(0,169,145,0.45);
  --ring:0 0 0 0.3rem rgba(0,169,145,0.28);
  --fast:140ms; --normal:280ms; --slow:520ms;
  --ease:cubic-bezier(0.2,0.6,0.2,1); --ease-out:cubic-bezier(0.16,1,0.3,1);
}
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:62.5%;-webkit-text-size-adjust:100%;}
body{font-family:var(--font);font-weight:var(--w-reg);font-size:var(--fs-body);
  line-height:var(--lh-body);color:var(--ink);background:var(--bg-page);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
svg{display:block;} a{color:inherit;text-decoration:none;}
::selection{background:rgba(0,169,145,0.22);}

/* ============================================================================
   BLOCK 2 — "En leverantör" (Evify layout · Hemsol interaction · Ampy quality)
   ============================================================================ */
.amp2{padding-block:clamp(var(--s-8),4rem + 6vw,12rem);background:var(--bg-page);}
.amp2__wrap{width:100%;max-width:120rem;margin-inline:auto;padding-inline:var(--s-5);}

/* — centred header (Evify structure, Ampy voice) — */
.amp2__head{max-width:64rem;margin-inline:auto;text-align:center;}
.amp2__title{font-size:var(--fs-h2);font-weight:var(--w-black);line-height:var(--lh-snug);
  letter-spacing:var(--tr-tight);color:var(--ink);}
.amp2__lead{margin:var(--s-4) auto 0;max-width:56ch;font-size:var(--fs-lead);
  font-weight:var(--w-light);line-height:1.5;color:var(--ink-muted);}

/* — grid: three equal square tiles, ~Evify spacing (30px gutters) — */
.amp2__grid{list-style:none;margin:clamp(var(--s-7),3rem + 2vw,6rem) 0 0;padding:0;
  display:grid;grid-template-columns:repeat(3,1fr);gap:3rem;}
.amp2__grid > li{display:flex;}

/* — the tile (whole tile is the link) — */
.tile{position:relative;width:100%;aspect-ratio:1/1;display:block;overflow:hidden;
  border-radius:var(--r-lg);background:var(--ap-navy);box-shadow:var(--shadow-2);
  transform:translateZ(0); /* WebKit: stop rounded-corner AA bleed under child transforms */
  transition:transform var(--normal) var(--ease),box-shadow var(--normal) var(--ease);
  isolation:isolate;}
.tile:hover,.tile:focus-visible{transform:translateY(-0.6rem);
  box-shadow:var(--shadow-3),var(--shadow-teal);outline:0;}
.tile:focus-visible{box-shadow:var(--ring),var(--shadow-3);}
.tile:active{transform:translateY(-0.2rem);transition-duration:var(--fast);}

/* the "photo" plate — SWAP this layer for a real <img class="tile__media"> when Ampy
   supplies rights-cleared install photos. Zooms on hover like Hemsol.
   Aurora kept near the tokens.css --aurora intensity so the stand-in stays Ampy-subtle. */
.tile__media{position:absolute;inset:0;z-index:0;border-radius:inherit;
  transform:scale(1);transition:transform var(--slow) var(--ease-out);will-change:transform;}
.tile--elservice .tile__media{background:
  radial-gradient(62rem 42rem at 82% 14%,rgba(0,169,145,0.44),transparent 60%),
  radial-gradient(40rem 30rem at 8% 92%,rgba(57,194,129,0.22),transparent 60%),
  var(--ap-navy);}
.tile--laddbox .tile__media{background:
  radial-gradient(60rem 42rem at 76% 84%,rgba(57,194,129,0.40),transparent 60%),
  radial-gradient(42rem 32rem at 14% 8%,rgba(0,169,145,0.30),transparent 60%),
  var(--ap-navy);}
.tile--batteri .tile__media{background:
  radial-gradient(56rem 42rem at 18% 18%,rgba(0,169,145,0.38),transparent 60%),
  radial-gradient(46rem 34rem at 92% 94%,rgba(85,255,154,0.18),transparent 60%),
  var(--ap-navy);}

/* large glyph = the tile's identity (texture, not a logo). White line, kept subtle. */
.tile__glyph{position:absolute;z-index:1;right:3%;top:9%;width:56%;height:auto;
  color:var(--ap-white);opacity:0.14;pointer-events:none;
  transition:opacity var(--slow) var(--ease),transform var(--slow) var(--ease-out);}
.tile__glyph svg{width:100%;height:auto;fill:none;stroke:currentColor;stroke-width:1;
  stroke-linecap:round;stroke-linejoin:round;}
.tile--elservice .tile__glyph{width:50%;right:6%;top:12%;}
.tile:hover .tile__glyph,.tile:focus-visible .tile__glyph{opacity:0.20;transform:scale(1.04);}

/* scrim for text legibility (always on; DEEPENS on hover) */
.tile__scrim{position:absolute;inset:0;z-index:2;opacity:0.9;
  background:linear-gradient(to top,rgba(9,11,50,0.94) 0%,rgba(9,11,50,0.46) 34%,rgba(9,11,50,0) 62%);
  transition:opacity var(--normal) var(--ease);}
.tile:hover .tile__scrim,.tile:focus-visible .tile__scrim{opacity:1;}

/* bottom-left content */
.tile__content{position:absolute;z-index:3;inset:auto 0 0 0;
  display:flex;flex-direction:column;align-items:flex-start;gap:var(--s-4);
  padding:clamp(var(--s-5),1.6rem + 1.6vw,3.2rem);}
.tile__label{font-size:var(--fs-h3);font-weight:var(--w-bold);line-height:1.05;
  letter-spacing:var(--tr-tight);color:var(--on-dark);}

/* the reveal: default = a small arrow chip; hover = a white pill "Se …" grows out */
.tile__cta{display:inline-flex;align-items:center;height:4.4rem;overflow:hidden;
  border-radius:var(--r-pill);background:rgba(255,255,255,0.20);color:var(--on-dark);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
  box-shadow:inset 0 0 0 0.1rem rgba(255,255,255,0.30);
  transition:background var(--normal) var(--ease),box-shadow var(--normal) var(--ease),padding var(--normal) var(--ease);}
.tile__ctatext{max-width:0;opacity:0;white-space:nowrap;font-size:var(--fs-sm);font-weight:var(--w-semi);
  transition:max-width var(--normal) var(--ease),opacity var(--fast) var(--ease),margin var(--normal) var(--ease);}
.tile__arrow{flex:0 0 auto;width:4.4rem;height:4.4rem;display:grid;place-items:center;
  transition:color var(--normal) var(--ease),transform var(--normal) var(--ease);}
.tile__arrow svg{width:2rem;height:2rem;fill:none;stroke:currentColor;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;}
.tile:hover .tile__cta,.tile:focus-visible .tile__cta{
  background:var(--ap-white);color:var(--ap-navy);padding-left:2rem;
  box-shadow:inset 0 0 0 0.1rem transparent,var(--shadow-2);}
.tile:hover .tile__ctatext,.tile:focus-visible .tile__ctatext{max-width:16rem;opacity:1;margin-right:0.4rem;}
.tile:hover .tile__arrow,.tile:focus-visible .tile__arrow{color:var(--ap-teal);transform:translateX(0.1rem);}

/* quiet fade-up on load (header → grid stagger, no collisions) */
@keyframes amp2-rise{from{opacity:0;transform:translateY(1.6rem);}to{opacity:1;transform:none;}}
.rise{animation:amp2-rise var(--slow) var(--ease-out) both;}
.rise.d1{animation-delay:.06s;} .rise.d2{animation-delay:.14s;}
.rise.d3{animation-delay:.22s;} .rise.d4{animation-delay:.30s;} .rise.d5{animation-delay:.38s;}

/* ===== responsive — match Evify's break (3-up ≥768, stacked below) ===== */
@media (max-width:767px){
  .amp2__grid{grid-template-columns:1fr;gap:var(--s-5);}
  .tile{aspect-ratio:4/3;}
}
@media (forced-colors:active){
  .tile:focus-visible{outline:0.2rem solid;outline-offset:0.2rem;}
}
</style>
</head>
<body>

<!-- ===== BLOCK 2 — "En leverantör" ===== -->
<section class="amp2" aria-labelledby="amp2-title">
  <div class="amp2__wrap">

    <header class="amp2__head">
      <h2 class="amp2__title rise d1" id="amp2-title">En leverantör, oavsett vad hemmet behöver.</h2>
      <p class="amp2__lead rise d2">Elservice, laddbox eller batteri. Våra behöriga elektriker tar hand om hela jobbet, från första kontakt till färdig installation.</p>
    </header>

    <ul class="amp2__grid">

      <!-- Elservice -->
      <li class="rise d3">
        <a class="tile tile--elservice" href="/elservice/">
          <span class="tile__media"></span>
          <span class="tile__glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M13 4 L7.5 13 h3.3 l-1 7 6.2-10 h-3.3 z"/></svg></span>
          <span class="tile__scrim"></span>
          <span class="tile__content">
            <span class="tile__label">Elservice</span>
            <span class="tile__cta">
              <span class="tile__ctatext">Se elservice</span>
              <span class="tile__arrow" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
            </span>
          </span>
        </a>
      </li>

      <!-- Laddbox -->
      <li class="rise d4">
        <a class="tile tile--laddbox" href="/laddboxar/">
          <span class="tile__media"></span>
          <span class="tile__glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2.5"/><path d="M13 7 L10 12.5 h2.4 l-0.8 4.5 4-6 h-2.4 z"/></svg></span>
          <span class="tile__scrim"></span>
          <span class="tile__content">
            <span class="tile__label">Laddbox</span>
            <span class="tile__cta">
              <span class="tile__ctatext">Se laddboxar</span>
              <span class="tile__arrow" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
            </span>
          </span>
        </a>
      </li>

      <!-- Batteri -->
      <li class="rise d5">
        <a class="tile tile--batteri" href="/batterilagring/">
          <span class="tile__media"></span>
          <span class="tile__glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="16" height="11" rx="2.2"/><path d="M19 10.5 h2 v4 h-2"/><path d="M10.8 9 L8 13 h2.2 l-0.7 3.4 3.4-4.4 h-2.2 z"/></svg></span>
          <span class="tile__scrim"></span>
          <span class="tile__content">
            <span class="tile__label">Batteri</span>
            <span class="tile__cta">
              <span class="tile__ctatext">Se batterier</span>
              <span class="tile__arrow" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
            </span>
          </span>
        </a>
      </li>

    </ul>
  </div>
</section>

</body>
</html>
